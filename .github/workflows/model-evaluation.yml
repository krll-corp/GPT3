name: Model Evaluation

on:
  workflow_dispatch:
  #schedule:
  #  - cron: '0 12 * * 1' #i don't know why, but i need this

jobs:
  v1-models-inference-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - k050506koch/GPT3-dev
          - k050506koch/GPT3-dev-125m
          - k050506koch/GPT3-dev-125m-0612
          - k050506koch/GPT3-dev-125m-1202
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install "transformers==4.52.4" datasets tqdm numpy

      - name: Run simple generation check
        env:
          TOKENIZERS_PARALLELISM: 'false'
        run: |
          python - <<'PY'
          import torch
          from eval import load_model_and_tokenizer

          model_name = "${{ matrix.model }}"
          prompt = "He is a doctor. His main goal is"
          device = torch.device("cuda" if torch.cuda.is_available() else "cpu")

          model, tokenizer = load_model_and_tokenizer(model_name, device)
          inputs = tokenizer(prompt, return_tensors="pt").to(device)
          input_length = inputs["input_ids"].shape[-1]

          with torch.no_grad():
              outputs = model.generate(
                  **inputs,
                  max_length=max(50, input_length + 1),
                  do_sample=False,
                  pad_token_id=tokenizer.pad_token_id,
                  eos_token_id=tokenizer.eos_token_id,
              )

          print(tokenizer.decode(outputs[0], skip_special_tokens=True))
          PY

  evaluate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - k050506koch/GPT3-dev
          - k050506koch/GPT3-dev-125m
          - k050506koch/GPT3-dev-125m-0612
          - k050506koch/GPT3-dev-125m-1202
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install "transformers==4.52.4" datasets tqdm numpy

      - name: Run evaluation
        env:
          TOKENIZERS_PARALLELISM: 'false'
        run: |
          python eval.py \
            --model "${{ matrix.model }}" \
            --run-hellaswag \
            --run-lambada \
            --run-mmlu \
            --mmlu-tasks abstract_algebra \
            --batch-size 2 \
            --block-size 128
